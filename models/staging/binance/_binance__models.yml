version: 2

models:
  - name: stg_binance__bitcoin_prices
    description: >
      One-second BTCUSDT bars from the Binance source: columns aliased to project
      names and cast to numeric, with null or non-positive prices filtered out.
      Kept close to source. Grain enforcement (one row per second) and the
      calendar derivations happen downstream in the hourly-bars model.
    columns:
      - name: event_at
        description: >
          Start of the one-second interval (UTC), carried straight from the
          source open_time.
        data_tests:
          - not_null
      - name: open
        description: First traded price in the second, the bar's open.
        data_tests:
          - not_null
          - dbt_utils.expression_is_true:
              expression: "> 0"
      - name: high
        description: Highest traded price in the second.
        data_tests:
          - not_null
          - dbt_utils.expression_is_true:
              expression: "> 0"
      - name: low
        description: Lowest traded price in the second.
        data_tests:
          - not_null
          - dbt_utils.expression_is_true:
              expression: "> 0"
      - name: close
        description: Last traded price in the second, the bar's close.
        data_tests:
          - not_null
          - dbt_utils.expression_is_true:
              expression: "> 0"
      - name: volume
        description: Base-asset (BTC) volume traded in the second.
        data_tests:
          - not_null
      - name: number_of_trades
        description: >
          Count of executed trades in the second, carried through so the hourly
          bars can sum it into a trade_count.
        data_tests:
          - not_null
