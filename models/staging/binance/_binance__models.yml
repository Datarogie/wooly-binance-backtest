version: 2

models:
  - name: stg_binance__bitcoin_prices
    description: One-second BTCUSDT bars aliased and cast to numeric from source. Exact duplicate source rows removed, so the grain is one row per second.
    columns:
      - name: pk_bitcoin_price_key
        description: Surrogate key for the second bar, hashed from open_time.
        data_tests:
          - unique
          - not_null
      - name: event_at
        description: Start of the one-second bar (UTC), from source open_time.
        data_tests:
          - not_null
      - name: open
        description: First traded price in the second.
        data_tests:
          - not_null
      - name: high
        description: Highest traded price in the second.
        data_tests:
          - not_null
      - name: low
        description: Lowest traded price in the second.
        data_tests:
          - not_null
      - name: close
        description: Last traded price in the second.
        data_tests:
          - not_null
      - name: volume
        description: BTC volume traded in the second.
        data_tests:
          - not_null
      - name: number_of_trades
        description: Count of executed trades in the second.
        data_tests:
          - not_null
