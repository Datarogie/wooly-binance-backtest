version: 2

unit_tests:
  - name: stg_bitcoin_prices_buckets_hour_boundaries
    description: >
      The seconds at the two edges of an hour (HH:00:00 and HH:59:59) must land
      in that same hour_of_day. A mid-hour-only fixture would pass a broken
      bucketer, so the edges are exactly what we assert. Also checks trade_date
      and the ISO day_of_week on a known date (2021-02-23 is a Tuesday = 2).
    model: stg_binance__bitcoin_prices
    given:
      - input: source('binance', 'bitcoin_prices')
        rows:
          # First second of hour 15 on a Tuesday.
          - {open_time: "2021-02-23 15:00:00", open: 100, high: 101, low: 99, close: 100, volume: 1, number_of_trades: 5}
          # Last second of hour 15 on the same day.
          - {open_time: "2021-02-23 15:59:59", open: 100, high: 101, low: 99, close: 100, volume: 1, number_of_trades: 5}
          # First second of hour 0 (midnight edge).
          - {open_time: "2021-02-23 00:00:00", open: 100, high: 101, low: 99, close: 100, volume: 1, number_of_trades: 5}
          # Last second of hour 23 (end-of-day edge).
          - {open_time: "2021-02-23 23:59:59", open: 100, high: 101, low: 99, close: 100, volume: 1, number_of_trades: 5}
    expect:
      rows:
        - {event_at: "2021-02-23 00:00:00", hour_of_day: 0, trade_date: "2021-02-23", day_of_week: 2}
        - {event_at: "2021-02-23 15:00:00", hour_of_day: 15, trade_date: "2021-02-23", day_of_week: 2}
        - {event_at: "2021-02-23 15:59:59", hour_of_day: 15, trade_date: "2021-02-23", day_of_week: 2}
        - {event_at: "2021-02-23 23:59:59", hour_of_day: 23, trade_date: "2021-02-23", day_of_week: 2}

  - name: stg_bitcoin_prices_filters_and_dedupes
    description: >
      Null and non-positive prices are dropped, and a doubled second collapses to
      one row keeping the higher-volume copy.
    model: stg_binance__bitcoin_prices
    given:
      - input: source('binance', 'bitcoin_prices')
        rows:
          # Valid bar.
          - {open_time: "2021-03-01 09:00:00", open: 100, high: 101, low: 99, close: 100, volume: 1, number_of_trades: 3}
          # Non-positive close: dropped.
          - {open_time: "2021-03-01 09:00:01", open: 100, high: 101, low: 99, close: 0, volume: 1, number_of_trades: 3}
          # Null open: dropped.
          - {open_time: "2021-03-01 09:00:02", open: null, high: 101, low: 99, close: 100, volume: 1, number_of_trades: 3}
          # Doubled second: keep the higher-volume row (close 200, volume 9).
          - {open_time: "2021-03-01 09:00:03", open: 100, high: 101, low: 99, close: 150, volume: 2, number_of_trades: 3}
          - {open_time: "2021-03-01 09:00:03", open: 100, high: 210, low: 99, close: 200, volume: 9, number_of_trades: 7}
    expect:
      rows:
        - {event_at: "2021-03-01 09:00:00", close: 100, volume: 1, number_of_trades: 3}
        - {event_at: "2021-03-01 09:00:03", close: 200, volume: 9, number_of_trades: 7}
