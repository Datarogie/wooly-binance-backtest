version: 2

sources:
  - name: binance
    description: >
      Raw Binance BTCUSDT klines loaded verbatim from the project-root CSV.
      One row per one-second bar. Loaded once and treated as static.
    schema: raw
    tables:
      - name: bitcoin_prices
        description: >
          One-second open, high, low, close, and volume (OHLCV) bars for
          BTCUSDT. Single symbol, no symbol column. `open_time` and `close_time`
          are real datetime values in this dump, not epoch integers, so staging
          casts them directly with no division.
        columns:
          - name: open_time
            description: Start of the one-second interval (UTC), the bar's stamp.
          - name: open
            description: First traded price in the second.
          - name: high
            description: Highest traded price in the second.
          - name: low
            description: Lowest traded price in the second.
          - name: close
            description: Last traded price in the second.
          - name: volume
            description: Base-asset (BTC) volume traded in the second.
          - name: close_time
            description: End of the one-second interval (UTC).
          - name: quote_asset_volume
            description: Quote-asset (USDT) volume traded in the second.
          - name: number_of_trades
            description: Count of individual executed trades in the second.
          - name: taker_buy_base_asset_volume
            description: Base-asset volume from taker buy orders.
          - name: taker_buy_quote_asset_volume
            description: Quote-asset volume from taker buy orders.
          - name: ignore
            description: Unused Binance field, carried through and not consumed.
