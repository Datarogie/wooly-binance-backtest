version: 2

sources:
  - name: binance
    description: Raw Binance BTCUSDT klines loaded from CSV. One row per one-second bar, static.
    schema: raw
    tables:
      - name: bitcoin_prices
        description: One-second OHLCV bars for BTCUSDT. open_time and close_time are datetimes, not epoch integers.
        columns:
          - name: open_time
            description: Start of the one-second bar (UTC).
          - name: open
            description: First traded price in the second.
          - name: high
            description: Highest traded price in the second.
          - name: low
            description: Lowest traded price in the second.
          - name: close
            description: Last traded price in the second.
          - name: volume
            description: BTC volume traded in the second.
          - name: close_time
            description: End of the one-second bar (UTC).
          - name: quote_asset_volume
            description: USDT volume traded in the second.
          - name: number_of_trades
            description: Count of executed trades in the second.
          - name: taker_buy_base_asset_volume
            description: BTC volume from taker buy orders.
          - name: taker_buy_quote_asset_volume
            description: USDT volume from taker buy orders.
          - name: ignore
            description: Unused Binance field.
