version: 2

models:
  - name: int_bitcoin__hourly_bars
    description: One-second bars resampled to one row per traded clock hour (OHLCV). The single heavy collapse, materialized as a table. Sparse, one row per hour that actually traded.
    columns:
      - name: pk_hourly_bar_key
        description: Surrogate key for the hourly bar, hashed from trade_date and hour_of_day.
        data_tests:
          - unique
          - not_null
      - name: trade_date
        description: Calendar date (UTC) of the hour.
      - name: hour_of_day
        description: Hour of day (UTC), 0 to 23.
      - name: hour_start_at
        description: Wall-clock start of the hour (UTC).
      - name: bar_open
        description: Open of the hour; the earliest second bar's open.
      - name: bar_high
        description: Highest price across the hour's second bars.
      - name: bar_low
        description: Lowest price across the hour's second bars.
      - name: bar_close
        description: Close of the hour; the latest second bar's close.
      - name: volume
        description: Total base-asset (BTC) volume across the hour.
      - name: first_observed_second_at
        description: Timestamp of the earliest second bar in the hour.
      - name: last_observed_second_at
        description: Timestamp of the latest second bar in the hour.
      - name: has_open_boundary
        description: True when a real bar exists exactly at the hour start (HH:00:00), so entry needs no carried price.
      - name: has_close_boundary
        description: True when a real bar exists at the last second of the hour (HH:59:59), so exit is a real observed price.
      - name: observed_seconds
        description: Count of seconds with a bar in the hour (coverage).
      - name: trade_count
        description: Total executed trades across the hour.

  - name: int_bitcoin__strategy_daily_trades
    description: One simulated trade per (date, hour), restricted to hours with a real bar at both boundary seconds; entry at bar open, exit at bar close, growth factor net of fee.
    columns:
      - name: pk_hourly_bar_key
        description: Surrogate key carried from the hourly bar (one trade per bar, so it stays unique here).
        data_tests:
          - unique
          - not_null
      - name: trade_date
        description: Trade date (UTC).
      - name: hour_of_day
        description: Hour of day (UTC), 0 to 23.
      - name: entry_price
        description: Bar open at the hour's first second (HH:00:00); a real observed price, never carried forward.
      - name: exit_price
        description: Bar close at the hour's last second (HH:59:59).
      - name: growth_factor
        description: exit_price / entry_price after the round-trip fee haircut.
      - name: daily_return
        description: growth_factor - 1.

  - name: int_bitcoin__strategy_equity_curve
    description: Running compounded equity curve per hour of day; exp(sum(ln(growth_factor))) across trade dates.
    columns:
      - name: pk_hourly_bar_key
        description: Surrogate key carried from the hourly bar (one equity point per bar, so it stays unique here).
        data_tests:
          - unique
          - not_null
      - name: trade_date
        description: Trade date (UTC).
      - name: hour_of_day
        description: Hour of day (UTC), 0 to 23.
      - name: growth_factor
        description: The day's growth factor.
      - name: daily_return
        description: growth_factor - 1.
      - name: cumulative_growth_factor
        description: Running product of growth factors for this hour up to this date.
      - name: cumulative_return
        description: cumulative_growth_factor - 1.
