version: 2

models:
  - name: int_bitcoin__hourly_bars
    description: One-second bars deduped and resampled to hourly OHLCV. Materialized as table; the one heavy query, read by both the hourly bars mart and strategy models.

  - name: int_bitcoin__strategy_daily_trades
    description: One simulated trade per (date, hour); entry at bar open or carried prior close, exit at bar close, growth factor net of fee.
    columns:
      - name: trade_date
        description: Trade date (UTC).
      - name: hour_of_day
        description: Hour of day (UTC), 0 to 23.
      - name: entry_price
        description: Bar open when the hour's first second is on the boundary, else the prior bar's close carried forward.
      - name: exit_price
        description: Bar close of the hour.
      - name: carried_price_staleness_seconds
        description: Seconds from the carried price's source to the hour start. Zero when bar open was used.
      - name: growth_factor
        description: exit_price / entry_price after the round-trip fee haircut.
      - name: daily_return
        description: growth_factor - 1.

  - name: int_bitcoin__strategy_equity_curve
    description: Running compounded equity curve per hour of day; exp(sum(ln(growth_factor))) across trade dates.
    columns:
      - name: trade_date
        description: Trade date (UTC).
      - name: hour_of_day
        description: Hour of day (UTC), 0 to 23.
      - name: growth_factor
        description: The day's growth factor.
      - name: daily_return
        description: growth_factor - 1.
      - name: cumulative_growth_factor
        description: Running product of growth factors for this hour up to this date.
      - name: cumulative_return
        description: cumulative_growth_factor - 1.
