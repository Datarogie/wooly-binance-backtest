version: 2

unit_tests:
  - name: hourly_bars_resamples_ohlcv
    description: >
      Over a single hour of second bars, open is the earliest bar's open, close the
      latest bar's close, high the max, low the min, volume the sum, and trade_date
      and hour_of_day are derived from event_at. The fixture puts the max high and
      min low mid-hour and feeds rows out of order, so an order-blind aggregate
      would fail; a lower-volume duplicate second checks that dedupe keeps the
      highest-volume survivor.
    model: int_bitcoin__hourly_bars
    given:
      - input: ref('stg_binance__bitcoin_prices')
        rows:
          - {event_at: "2021-05-01 10:00:03", open: 240, high: 255, low: 235, close: 250, volume: 4, number_of_trades: 2}
          - {event_at: "2021-05-01 10:00:00", open: 100, high: 150, low: 90, close: 120, volume: 1, number_of_trades: 3}
          - {event_at: "2021-05-01 10:00:01", open: 120, high: 300, low: 80, close: 130, volume: 2, number_of_trades: 5}
          - {event_at: "2021-05-01 10:00:02", open: 130, high: 200, low: 110, close: 240, volume: 3, number_of_trades: 1}
          - {event_at: "2021-05-01 10:00:02", open: 999, high: 999, low: 999, close: 999, volume: 1, number_of_trades: 9}
    expect:
      rows:
        - {trade_date: "2021-05-01", hour_of_day: 10, hour_start_at: "2021-05-01 10:00:00", bar_open: 100, bar_high: 300, bar_low: 80, bar_close: 250, volume: 10, first_observed_second_at: "2021-05-01 10:00:00", last_observed_second_at: "2021-05-01 10:00:03", observed_seconds: 4, trade_count: 11}

  - name: daily_trades_growth_factor_and_fee
    description: >
      Growth factor is exit / entry after the round-trip fee haircut, and
      daily_return is growth_factor - 1. Run with fee_basis_points = 100 (1 percent
      round trip) so the haircut is visible: entry 100, exit 110 gives 1.10 gross,
      times (1 - 0.01) = 1.089 net, daily_return 0.089. The boundary is hit (first
      second at hour_start_at) so entry is this hour's own open.
    model: int_bitcoin__strategy_daily_trades
    overrides:
      vars:
        fee_basis_points: 100
    given:
      - input: ref('int_bitcoin__hourly_bars')
        rows:
          - {trade_date: "2021-06-01", hour_of_day: 9, hour_start_at: "2021-06-01 09:00:00", first_observed_second_at: "2021-06-01 09:00:00", last_observed_second_at: "2021-06-01 09:59:59", bar_open: 100, bar_close: 110}
    expect:
      rows:
        - {trade_date: "2021-06-01", hour_of_day: 9, entry_price: 100, exit_price: 110, carried_price_staleness_seconds: 0, growth_factor: "1.089000000000000", daily_return: "0.089000000000000"}

  - name: daily_trades_carry_forward_across_gap
    description: >
      Frictionless (default fee 0). The later bar opens late (its first second is
      after the hour start), so its entry must carry forward the prior bar's close
      (200), not use its own open (999). A fully missing hour between the two is
      absent from the input, proving lag reaches across the gap rather than needing
      a calendar spine. Staleness is measured from the prior bar's last observed
      second to this hour's start (1 hour + 1 second = 3601). Hour 0 hits its
      boundary cleanly, so it trades on its own open.
    model: int_bitcoin__strategy_daily_trades
    given:
      - input: ref('int_bitcoin__hourly_bars')
        rows:
          - {trade_date: "2021-07-01", hour_of_day: 0, hour_start_at: "2021-07-01 00:00:00", first_observed_second_at: "2021-07-01 00:00:00", last_observed_second_at: "2021-07-01 00:59:59", bar_open: 180, bar_close: 200}
          - {trade_date: "2021-07-01", hour_of_day: 2, hour_start_at: "2021-07-01 02:00:00", first_observed_second_at: "2021-07-01 02:00:30", last_observed_second_at: "2021-07-01 02:59:59", bar_open: 999, bar_close: 220}
    expect:
      rows:
        - {trade_date: "2021-07-01", hour_of_day: 0, entry_price: 180, exit_price: 200, carried_price_staleness_seconds: 0, growth_factor: "1.111111111111111", daily_return: "0.111111111111111"}
        - {trade_date: "2021-07-01", hour_of_day: 2, entry_price: 200, exit_price: 220, carried_price_staleness_seconds: 3601, growth_factor: "1.100000000000000", daily_return: "0.100000000000000"}

  - name: equity_curve_compounds_to_hand_computed
    description: >
      A known growth-factor sequence for one hour compounds to a hand-computed
      cumulative product. 1.10, then 0.50, then 2.00 gives running products 1.10,
      0.55, 1.10. Proves the exp(sum(ln)) running product is correct, including a
      losing day in the middle.
    model: int_bitcoin__strategy_equity_curve
    given:
      - input: ref('int_bitcoin__strategy_daily_trades')
        format: sql
        rows: |
          select cast('2021-08-01' as date) as trade_date, 12 as hour_of_day, cast(1.10 as numeric) as growth_factor, cast(0.10 as numeric) as daily_return
          union all
          select cast('2021-08-02' as date) as trade_date, 12 as hour_of_day, cast(0.50 as numeric) as growth_factor, cast(-0.50 as numeric) as daily_return
          union all
          select cast('2021-08-03' as date) as trade_date, 12 as hour_of_day, cast(2.00 as numeric) as growth_factor, cast(1.00 as numeric) as daily_return
    expect:
      rows:
        - {trade_date: "2021-08-01", hour_of_day: 12, cumulative_growth_factor: "1.100000000000000", cumulative_return: "0.100000000000000"}
        - {trade_date: "2021-08-02", hour_of_day: 12, cumulative_growth_factor: "0.550000000000000", cumulative_return: "-0.450000000000000"}
        - {trade_date: "2021-08-03", hour_of_day: 12, cumulative_growth_factor: "1.100000000000000", cumulative_return: "0.100000000000000"}
