version: 2

models:
  - name: fct_strategy_performance_by_hour
    description: >
      One row per hour of day summarizing the reinvested strategy's performance
      over the full history. The headline metric, total_compounded_return, is
      read at the last trade date rather than the peak, so an hour that ran up
      and gave it back is scored where it ended. Conformed and join-free for BI.
      Answers Q1 (the biggest compounded return) once ranked in the analysis.
    columns:
      - name: hour_of_day
        description: Hour of day (UTC), 0 to 23. The primary key.
        data_tests:
          - unique
          - not_null
          - dbt_expectations.expect_column_values_to_be_between:
              min_value: 0
              max_value: 23
      - name: total_compounded_return
        description: >
          Compounded return at the final trade date: the reinvested equity
          curve's last value minus one. Never the peak ever reached.
        data_tests:
          - not_null
      - name: trading_days
        description: Number of dates this hour traded. A comparability column.
        data_tests:
          - not_null
          - dbt_utils.expression_is_true:
              expression: "> 0"
      - name: average_daily_return
        description: Mean of the hour's daily returns across all trading days.
        data_tests:
          - not_null
      - name: daily_return_standard_deviation
        description: >
          Sample standard deviation of the hour's daily returns, a dispersion
          measure for judging how steady the compounded return was.
        data_tests:
          - not_null
      - name: first_trade_date
        description: Earliest date this hour traded. A comparability column.
        data_tests:
          - not_null
      - name: last_trade_date
        description: >
          Latest date this hour traded, where the compounded return is read. A
          comparability column.
        data_tests:
          - not_null

  - name: fct_strategy_drawdown_by_hour
    description: >
      One row per hour of day exposing the strategy's loss profile so Q2 can be
      answered under any reading of "maximum losses". Three measures: the maximum
      drawdown against the running peak, the worst loss below starting capital,
      and the worst single-day return. Conformed and join-free for BI.
    columns:
      - name: hour_of_day
        description: Hour of day (UTC), 0 to 23. The primary key.
        data_tests:
          - unique
          - not_null
          - dbt_expectations.expect_column_values_to_be_between:
              min_value: 0
              max_value: 23
      - name: maximum_drawdown
        description: >
          Deepest peak-to-trough drop on the reinvested equity curve, measured
          against the running peak. Zero or negative (a drop is negative).
        data_tests:
          - not_null
          - dbt_utils.expression_is_true:
              expression: "<= 0"
      - name: maximum_loss_from_start
        description: >
          Worst loss below the starting unit of capital, floored at zero so an
          hour that was never underwater reads as no loss.
        data_tests:
          - not_null
          - dbt_utils.expression_is_true:
              expression: ">= 0"
      - name: worst_single_day_return
        description: The most negative single-day return this hour ever posted.
        data_tests:
          - not_null
      - name: first_trade_date
        description: Earliest date this hour traded. A comparability column.
        data_tests:
          - not_null
      - name: last_trade_date
        description: Latest date this hour traded. A comparability column.
        data_tests:
          - not_null
      - name: trading_days
        description: Number of dates this hour traded. A comparability column.
        data_tests:
          - not_null
          - dbt_utils.expression_is_true:
              expression: "> 0"
