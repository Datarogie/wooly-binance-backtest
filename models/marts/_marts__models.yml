version: 2

models:
  - name: fct_bitcoin_hourly_bars
    description: >
      Hourly OHLCV bars for BTCUSDT, resampled from the one-second staging bars
      over each clock hour (open = first, high = max, low = min, close = last,
      volume = sum). The reusable general-layer product: any hourly Bitcoin
      question reads this instead of touching raw data. Audit columns expose how
      well each hour is covered so a thin bar can be judged before it is trusted.
      A thin view of int_bitcoin__hourly_bars, the materialized resample.
    data_tests:
      - dbt_utils.unique_combination_of_columns:
          combination_of_columns:
            - trade_date
            - hour_of_day
    columns:
      - name: trade_date
        description: Calendar date (UTC) of the hour. Part of the primary key.
        data_tests:
          - not_null
      - name: hour_of_day
        description: Hour of day (UTC), 0 to 23. Part of the primary key.
        data_tests:
          - not_null
          - dbt_expectations.expect_column_values_to_be_between:
              min_value: 0
              max_value: 23
      - name: hour_start_at
        description: >
          Wall-clock start of the hour (UTC), truncated from the first observed
          second. The instant the strategy's entry is anchored to.
        data_tests:
          - not_null
      - name: bar_open
        description: >
          Open of the hour: the open price of the earliest second bar in the
          hour. The strategy's entry price when the hour's first second is
          present.
        data_tests:
          - not_null
          - dbt_utils.expression_is_true:
              expression: "> 0"
      - name: bar_high
        description: Highest price observed across the hour's second bars.
        data_tests:
          - not_null
          - dbt_utils.expression_is_true:
              expression: "> 0"
      - name: bar_low
        description: Lowest price observed across the hour's second bars.
        data_tests:
          - not_null
          - dbt_utils.expression_is_true:
              expression: "> 0"
      - name: bar_close
        description: >
          Close of the hour: the close price of the latest second bar in the
          hour. The strategy's exit price.
        data_tests:
          - not_null
          - dbt_utils.expression_is_true:
              expression: "> 0"
      - name: volume
        description: Total base-asset (BTC) volume traded across the hour.
        data_tests:
          - not_null
      - name: first_observed_second_at
        description: >
          Timestamp of the earliest second bar in the hour. When this is later
          than hour_start_at, the hour opened with a gap and the strategy's entry
          carries forward instead of using bar_open.
        data_tests:
          - not_null
      - name: last_observed_second_at
        description: Timestamp of the latest second bar in the hour.
        data_tests:
          - not_null
      - name: observed_seconds
        description: >
          How many of the hour's 3600 possible seconds actually have a bar. The
          coverage measure: a low value means a thin, less trustworthy hour. Not
          a count of trades.
        data_tests:
          - not_null
          - dbt_expectations.expect_column_values_to_be_between:
              min_value: "{{ var('hourly_coverage_floor_seconds') }}"
              max_value: 3600
              row_condition: "true"
              config:
                severity: warn
      - name: trade_count
        description: >
          Total individual executed trades across the hour, summed from the
          source number_of_trades. Distinct from observed_seconds.
        data_tests:
          - not_null

  - name: fct_strategy_performance_by_hour
    description: >
      One row per hour of day summarizing the reinvested strategy's performance
      over the full history. The headline metric, total_compounded_return, is
      read at the last trade date rather than the peak, so an hour that ran up
      and gave it back is scored where it ended. Conformed and join-free for BI.
      Answers Q1 (the biggest compounded return) once ranked in the analysis.
    columns:
      - name: hour_of_day
        description: Hour of day (UTC), 0 to 23. The primary key.
        # Lightdash dimension: the x-axis for every per-hour chart. The mart is
        # already one row per hour, so each metric below is a passthrough max.
        config:
          meta:
            dimension:
              type: number
              label: Hour of day (UTC)
        data_tests:
          - unique
          - not_null
          - dbt_expectations.expect_column_values_to_be_between:
              min_value: 0
              max_value: 23
      - name: total_compounded_return
        description: >
          Compounded return at the final trade date: the reinvested equity
          curve's last value minus one. Never the peak ever reached.
        config:
          meta:
            metrics:
              total_compounded_return_metric:
                label: Total compounded return
                type: max
                description: >
                  Compounded return at the final trade date for the hour. The Q1
                  headline; chart this by hour_of_day and the peak bar is the
                  best hour to trade.
                format: '#,##0.0%'
        data_tests:
          - not_null
      - name: trading_days
        description: Number of dates this hour traded. A comparability column.
        config:
          meta:
            metrics:
              trading_days_metric:
                label: Trading days
                type: max
                description: Number of dates this hour traded.
        data_tests:
          - not_null
          - dbt_utils.expression_is_true:
              expression: "> 0"
      - name: average_daily_return
        description: Mean of the hour's daily returns across all trading days.
        config:
          meta:
            metrics:
              average_daily_return_metric:
                label: Average daily return
                type: max
                description: Mean of the hour's daily returns across all trading days.
                format: '#,##0.00%'
        data_tests:
          - not_null
      - name: daily_return_standard_deviation
        description: >
          Sample standard deviation of the hour's daily returns, a dispersion
          measure for judging how steady the compounded return was.
        config:
          meta:
            metrics:
              daily_return_standard_deviation_metric:
                label: Daily return standard deviation
                type: max
                description: >
                  Sample standard deviation of the hour's daily returns, a
                  dispersion measure for the compounded return.
                format: '#,##0.00%'
        data_tests:
          - not_null
      - name: first_trade_date
        description: Earliest date this hour traded. A comparability column.
        config:
          meta:
            dimension:
              type: date
              label: First trade date
        data_tests:
          - not_null
      - name: last_trade_date
        description: >
          Latest date this hour traded, where the compounded return is read. A
          comparability column.
        config:
          meta:
            dimension:
              type: date
              label: Last trade date
        data_tests:
          - not_null

  - name: fct_strategy_drawdown_by_hour
    description: >
      One row per hour of day exposing the strategy's loss profile so Q2 can be
      answered under any reading of "maximum losses". Three measures: the maximum
      drawdown against the running peak, the worst loss below starting capital,
      and the worst single-day return. Conformed and join-free for BI.
    columns:
      - name: hour_of_day
        description: Hour of day (UTC), 0 to 23. The primary key.
        # Lightdash dimension: the x-axis for the drawdown-by-hour chart.
        config:
          meta:
            dimension:
              type: number
              label: Hour of day (UTC)
        data_tests:
          - unique
          - not_null
          - dbt_expectations.expect_column_values_to_be_between:
              min_value: 0
              max_value: 23
      - name: maximum_drawdown
        description: >
          Deepest peak-to-trough drop on the reinvested equity curve, measured
          against the running peak. Zero or negative (a drop is negative).
        config:
          meta:
            metrics:
              maximum_drawdown_metric:
                label: Maximum drawdown
                type: max
                description: >
                  Deepest peak-to-trough drop on the reinvested equity curve.
                  Negative; the hour with the value closest to zero is the Q2
                  answer (lowest maximum loss).
                format: '#,##0.0%'
        data_tests:
          - not_null
          - dbt_utils.expression_is_true:
              expression: "<= 0"
      - name: maximum_loss_from_start
        description: >
          Worst loss below the starting unit of capital, floored at zero so an
          hour that was never underwater reads as no loss.
        config:
          meta:
            metrics:
              maximum_loss_from_start_metric:
                label: Maximum loss from start
                type: max
                description: >
                  Worst loss below the starting unit of capital, floored at zero.
                format: '#,##0.0%'
        data_tests:
          - not_null
          - dbt_utils.expression_is_true:
              expression: ">= 0"
      - name: worst_single_day_return
        description: The most negative single-day return this hour ever posted.
        config:
          meta:
            metrics:
              worst_single_day_return_metric:
                label: Worst single day return
                type: max
                description: The most negative single-day return this hour ever posted.
                format: '#,##0.00%'
        data_tests:
          - not_null
      - name: first_trade_date
        description: Earliest date this hour traded. A comparability column.
        config:
          meta:
            dimension:
              type: date
              label: First trade date
        data_tests:
          - not_null
      - name: last_trade_date
        description: Latest date this hour traded. A comparability column.
        config:
          meta:
            dimension:
              type: date
              label: Last trade date
        data_tests:
          - not_null
      - name: trading_days
        description: Number of dates this hour traded. A comparability column.
        config:
          meta:
            metrics:
              drawdown_trading_days_metric:
                label: Trading days
                type: max
                description: Number of dates this hour traded.
        data_tests:
          - not_null
          - dbt_utils.expression_is_true:
              expression: "> 0"
