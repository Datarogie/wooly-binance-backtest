version: 2

models:
  - name: fct_bitcoin_hourly_bars
    description: Hourly OHLCV bars for BTCUSDT, resampled from one-second staging bars (open = first, high = max, low = min, close = last, volume = sum).
    columns:
      - name: hourly_bar_id
        description: Surrogate key derived from trade_date and hour_of_day.
        data_tests:
          - unique
          - not_null
      - name: trade_date
        description: Calendar date (UTC) of the hour. Part of the primary key.
        data_tests:
          - not_null
      - name: hour_of_day
        description: Hour of day (UTC), 0 to 23. Part of the primary key.
        data_tests:
          - not_null
          - dbt_expectations.expect_column_values_to_be_between:
              arguments:
                min_value: 0
                max_value: 23
      - name: hour_start_at
        description: Start of the clock hour (UTC).
        data_tests:
          - not_null
      - name: bar_open
        description: Open price of the hour (first second bar's open).
        data_tests:
          - not_null
          - dbt_utils.expression_is_true:
              arguments:
                expression: "> 0"
      - name: bar_high
        description: Highest price observed across the hour's second bars.
        data_tests:
          - not_null
          - dbt_utils.expression_is_true:
              arguments:
                expression: "> 0"
      - name: bar_low
        description: Lowest price observed across the hour's second bars.
        data_tests:
          - not_null
          - dbt_utils.expression_is_true:
              arguments:
                expression: "> 0"
      - name: bar_close
        description: Close price of the hour (last second bar's close).
        data_tests:
          - not_null
          - dbt_utils.expression_is_true:
              arguments:
                expression: "> 0"
      - name: volume
        description: Total base-asset (BTC) volume traded across the hour.
        data_tests:
          - not_null
      - name: first_observed_second_at
        description: Timestamp of the earliest second bar in the hour.
        data_tests:
          - not_null
      - name: last_observed_second_at
        description: Timestamp of the latest second bar in the hour.
        data_tests:
          - not_null
      - name: observed_seconds
        description: Count of seconds with a bar in the hour, out of 3600 possible.
        data_tests:
          - not_null
          - dbt_expectations.expect_column_values_to_be_between:
              arguments:
                min_value: "{{ var('hourly_coverage_floor_seconds') }}"
                max_value: 3600
                row_condition: "true"
              config:
                severity: warn
      - name: trade_count
        description: Total executed trades in the hour, summed from number_of_trades.
        data_tests:
          - not_null
