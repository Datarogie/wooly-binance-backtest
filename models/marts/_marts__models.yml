version: 2

models:
  - name: fct_bitcoin_hourly_bars
    description: Hourly OHLCV bars for BTCUSDT resampled from one-second bars; use for any hourly Bitcoin OHLCV question. Sparse, one row per hour that actually traded.
    columns:
      - name: pk_hourly_bar_key
        description: Surrogate key for the hourly bar, hashed from trade_date and hour_of_day.
        data_tests:
          - unique
          - not_null
      - name: trade_date
        description: Calendar date (UTC) of the hour.
        data_tests:
          - not_null
      - name: hour_of_day
        description: Hour of day (UTC), 0 to 23.
        data_tests:
          - not_null
          - dbt_utils.expression_is_true:
              arguments:
                expression: "between 0 and 23"
      - name: hour_start_at
        description: Wall-clock start of the hour (UTC), truncated from the first observed second.
        data_tests:
          - not_null
      - name: bar_open
        description: Open price of the hour; the open of the earliest second bar.
        data_tests:
          - not_null
          - dbt_utils.expression_is_true:
              arguments:
                expression: "> 0"
      - name: bar_high
        description: Highest price observed across the hour's second bars.
        data_tests:
          - not_null
          - dbt_utils.expression_is_true:
              arguments:
                expression: "> 0"
      - name: bar_low
        description: Lowest price observed across the hour's second bars.
        data_tests:
          - not_null
          - dbt_utils.expression_is_true:
              arguments:
                expression: "> 0"
      - name: bar_close
        description: Close price of the hour; the close of the latest second bar.
        data_tests:
          - not_null
          - dbt_utils.expression_is_true:
              arguments:
                expression: "> 0"
      - name: volume
        description: Total base-asset (BTC) volume traded across the hour.
        data_tests:
          - not_null
      - name: first_observed_second_at
        description: Timestamp of the earliest second bar in the hour.
        data_tests:
          - not_null
      - name: last_observed_second_at
        description: Timestamp of the latest second bar in the hour.
        data_tests:
          - not_null
      - name: has_open_boundary
        description: True when a real bar exists exactly at the hour start (HH:00:00). The strategy trades an hour only when this is true.
        data_tests:
          - not_null
      - name: has_close_boundary
        description: True when a real bar exists at the hour's last second (HH:59:59). The strategy trades an hour only when this is true.
        data_tests:
          - not_null
      - name: observed_seconds
        description: Count of seconds with a bar in the hour, out of 3600 possible.
        data_tests:
          - not_null
      - name: trade_count
        description: Total executed trades in the hour, summed from number_of_trades.
        data_tests:
          - not_null

  - name: fct_strategy_by_hour
    description: One row per hour of day summarizing the reinvested strategy over the full history; compounded return and daily-return stats (Q1) alongside the loss/drawdown profile (Q2). Same grain, one self-serve surface.
    columns:
      - name: hour_of_day
        description: Hour of day (UTC), 0 to 23. Primary key.
        data_tests:
          - unique
          - not_null
          - dbt_utils.expression_is_true:
              arguments:
                expression: "between 0 and 23"
      - name: total_compounded_return
        description: Compounded return at the final trade date; the equity curve's last value minus one. Sort descending for Q1.
        data_tests:
          - not_null
      - name: average_daily_return
        description: Mean of the hour's daily returns across all trading days.
        data_tests:
          - not_null
      - name: daily_return_standard_deviation
        description: Sample standard deviation of the hour's daily returns.
        data_tests:
          - not_null
      - name: maximum_drawdown
        description: Deepest peak-to-trough drop on the reinvested equity curve measured against the running peak. Zero or negative; the hour closest to zero is the Q2 answer.
        data_tests:
          - not_null
          - dbt_utils.expression_is_true:
              arguments:
                expression: "<= 0"
      - name: maximum_loss_from_start
        description: Worst loss below starting capital, floored at zero so an hour never underwater reads as no loss.
        data_tests:
          - not_null
          - dbt_utils.expression_is_true:
              arguments:
                expression: ">= 0"
      - name: worst_single_day_return
        description: The most negative single-day return this hour ever posted.
        data_tests:
          - not_null
      - name: trading_days
        description: Number of dates this hour traded.
        data_tests:
          - not_null
          - dbt_utils.expression_is_true:
              arguments:
                expression: "> 0"
      - name: first_trade_date
        description: Earliest date this hour traded.
        data_tests:
          - not_null
      - name: last_trade_date
        description: Latest date this hour traded; where the compounded return is read.
        data_tests:
          - not_null
